# Production stack — runs on the EC2 server.
# Images are pulled from Amazon ECR; database is MongoDB Atlas (cloud).
# HTTPS is terminated by nginx in the client container using a Let's Encrypt
# certificate that the certbot container issues and auto-renews.
#
# Variable substitution (${...}) is read from the .env file in this directory.
# That .env is NOT committed — copy .env.example and fill it in on the server.

services:
  server:
    image: ${ECR_SERVER_IMAGE}
    container_name: keren-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env

  client:
    image: ${ECR_CLIENT_IMAGE}
    container_name: keren-client
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro   # prod HTTPS reverse-proxy config
      - certbot-etc:/etc/letsencrypt                      # SSL certificates
      - certbot-www:/var/www/certbot                      # ACME challenge files
    depends_on:
      - server

  # Renews the SSL certificate automatically (checks every 12h).
  certbot:
    image: certbot/certbot
    container_name: keren-certbot
    restart: unless-stopped
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"

volumes:
  certbot-etc:
  certbot-www:
