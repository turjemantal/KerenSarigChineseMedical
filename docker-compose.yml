services:
  mongo:
    image: mongo:7
    container_name: keren-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: keren-clinic

  server:
    build: ./server
    container_name: keren-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      APP_ENV: ${APP_ENV}
      MONGODB_URI: mongodb://mongo:27017/keren-clinic
      PORT: 3001
      CLIENT_URL: ${CLIENT_URL}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_TEMPLATE_LANGUAGE: ${WHATSAPP_TEMPLATE_LANGUAGE:-}
      WHATSAPP_TEMPLATE_OTP: ${WHATSAPP_TEMPLATE_OTP:-}
      WHATSAPP_TEMPLATE_BOOKING_CONFIRMATION: ${WHATSAPP_TEMPLATE_BOOKING_CONFIRMATION:-}
      WHATSAPP_TEMPLATE_APPOINTMENT_REMINDER: ${WHATSAPP_TEMPLATE_APPOINTMENT_REMINDER:-}
    depends_on:
      - mongo

  client:
    build: ./client
    container_name: keren-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mongo_data:
