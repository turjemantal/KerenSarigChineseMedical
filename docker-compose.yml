services:
  mongo:
    image: mongo:7
    container_name: keren-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: keren-clinic

  server:
    build: ./server
    container_name: keren-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      MONGODB_URI: mongodb://mongo:27017/keren-clinic
      PORT: 3001
      CLIENT_URL: http://localhost:5173
    depends_on:
      - mongo

  client:
    build: ./client
    container_name: keren-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mongo_data:
