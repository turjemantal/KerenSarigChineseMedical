services:
  mongo:
    image: mongo:7
    container_name: keren-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: keren-clinic
    # rotate logs so they never fill the disk (3 files × 10MB per container)
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  server:
    build: ./server
    container_name: keren-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/keren-clinic
    depends_on:
      - mongo
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  client:
    build:
      context: ./client
      args:
        # Vite build-time config — compose reads the value from the root .env
        VITE_MEDIA_BASE_URL: ${VITE_MEDIA_BASE_URL}
    container_name: keren-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

volumes:
  mongo_data:
