# Production nginx config — mounted into the client container by docker-compose.prod.yml.
# (Local development uses client/nginx.conf, which is baked into the image and is HTTP-only.)
#
# Port 80  → redirects to HTTPS, but keeps the ACME challenge path open for cert renewals.
# Port 443 → serves the React app over HTTPS and proxies /api to the NestJS server.

server {
    listen 80;
    server_name kerensarig.co.il www.kerensarig.co.il;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name kerensarig.co.il www.kerensarig.co.il;

    ssl_certificate /etc/letsencrypt/live/kerensarig.co.il/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kerensarig.co.il/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://server:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
